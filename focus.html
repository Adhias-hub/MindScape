<!DOCTYPE html>
<html lang="id">
<head>
  <meta name="description" content="MindSpace: Aplikasi produktivitas mahasiswa untuk mengatur jadwal kuliah, tugas, kesehatan, dan fokus belajar dengan notifikasi pintar.">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Mode</title>
  
  <link rel="stylesheet" href="/src/focus.css">
  <link rel="manifest" href="manifest.json">
  
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://apis.google.com https://*.googleapis.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' https://cdn-icons-png.flaticon.com https://apis.google.com data:; connect-src 'self' https://cdn-icons-png.flaticon.com https://*.googleapis.com https://*.firebaseio.com https://*.firebase.com https://identitytoolkit.googleapis.com https://firebaseinstallations.googleapis.com https://fcm.googleapis.com https://fcmregistrations.googleapis.com https://apis.google.com; frame-src https://*.firebaseapp.com https://accounts.google.com;">

  <style>
    .btn-toggle-history {
      width: 100%;
      padding: 16px;
      background: #f4f6ff;
      color: #4b5cff;
      border: 2px dashed #4b5cff;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
      text-align: center;
      box-shadow: 0 4px 12px rgba(75, 92, 255, 0.02);
      margin-bottom: 25px;
    }
    .btn-toggle-history:hover { background: #eef1ff; transform: translateY(-1px); }
    .btn-toggle-history.aktif { background: #4b5cff; color: white; border-style: solid; box-shadow: 0 8px 20px rgba(75, 92, 255, 0.15); }
    .box-histori-pembungkus { animation: slideDownFade 0.3s ease-out; }
    @keyframes slideDownFade { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body>

  <header class="home-header">
    <div class="logo-area"><h1>MindSpace 🌸</h1></div>
    <nav class="navbar" aria-label="Menu Utama">
      <a href="home.html">Beranda</a>
      <a href="jadwal.html">Jadwal</a>
      <a href="todo.html">To-Do List</a>
      <a href="wellness.html">Wellness</a>
      <a href="focus.html">Focus Mode</a>
    </nav>
  </header>

  <section class="focus-section">
    <h2>⏰ Focus Mode</h2>

    <div class="focus-form" role="form">
      <input type="number" id="focusMinutes" placeholder="Masukkan durasi belajar (menit)" aria-label="Durasi Menit">
      <input type="text" id="focusTarget" placeholder="Target belajar" aria-label="Target">
      <textarea id="focusNote" placeholder="Catatan hasil belajar" aria-label="Catatan"></textarea>
    </div>

    <div class="focus-layout-wrapper">
      <div class="timer-box">
        <h1 id="displayTimerFokus">00:00</h1>
        <div class="timer-buttons">
          <button id="btnMulaiFocus">Mulai</button>
          <button id="btnBerhentiFokus" class="btn-secondary">Berhenti / Reset</button>
        </div>
      </div> 

      <div class="focus-target-box">
        <div class="target-sub-box">
          <h3>🎯 Target Belajar</h3>
          <p id="targetDisplay">Belum ada target belajar.</p>
        </div>
        <div class="box-divider"></div>
        <div class="note-sub-box">
          <h3>📝 Catatan Belajar</h3>
          <p id="noteDisplay">Belum ada catatan.</p>
        </div>
      </div> 
    </div> 
    
    <div class="focus-history-section" style="margin-top: 50px; max-width: 1200px; margin-left: auto; margin-right: auto;">
      <button class="btn-toggle-history" id="btnToggleFocus">📜 Jurnal Riwayat Fokus (Buka)</button>
      <div id="pembungkusHistoriFocus" class="box-histori-pembungkus" style="display: none;">
        <h3>📜 Jurnal Riwayat Fokus</h3>
        <div id="containerFocusHistory"></div>
      </div>
    </div>
  </section>

  <script type="module" src="/src/main.js"></script>

  <script>
    document.getElementById('btnMulaiFocus')?.addEventListener('click', () => {
      const inputMenit = document.getElementById('focusMinutes');
      const inputTarget = document.getElementById('focusTarget');
      const inputNote = document.getElementById('focusNote');
      
      const durasi = parseInt(inputMenit?.value);
      const targetTeks = inputTarget?.value.trim() || "Belajar Umum";
      const catatanTeks = inputNote?.value.trim() || "-";
      
      if (!durasi || isNaN(durasi) || durasi <= 0) {
        alert("Silakan masukkan durasi belajar yang valid dalam menit! 😊");
        return;
      }
      
      // Serahkan tugas penguncian dan hitung mundur sepenuhnya ke main.js
      if (typeof window.mulaiFocusMode === 'function') {
        window.mulaiFocusMode(durasi, targetTeks, catatanTeks);
      }
    });

    document.getElementById('btnBerhentiFokus')?.addEventListener('click', () => {
      if (typeof window.stopFocusMode === 'function') {
        window.stopFocusMode();
      }
    });
  </script>

</body>
</html>
