<!DOCTYPE html>
<html lang="id">

<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://apis.google.com https://*.googleapis.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' https://cdn-icons-png.flaticon.com https://apis.google.com data:; connect-src 'self' https://cdn-icons-png.flaticon.com https://*.googleapis.com https://*.firebaseio.com https://*.firebase.com https://identitytoolkit.googleapis.com https://firebaseinstallations.googleapis.com https://fcm.googleapis.com https://fcmregistrations.googleapis.com https://apis.google.com; frame-src https://*.firebaseapp.com https://accounts.google.com;">
  <meta name="description" content="MindSpace: Aplikasi produktivitas mahasiswa untuk mengatur jadwal kuliah, tugas, kesehatan, dan fokus belajar dengan notifikasi pintar.">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Kuliah - MindSpace</title>
  
  <link rel="stylesheet" href="/src/jadwal.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

  <header class="home-header">
    <div class="logo-area">
      <h1>MindSpace 🌸</h1>
    </div>

    <nav class="navbar" aria-label="Menu Navigasi Utama">
      <a href="home.html">Beranda</a>
      <a href="jadwal.html">Jadwal</a>
      <a href="todo.html">To-Do List</a>
      <a href="wellness.html">Wellness</a>
      <a href="focus.html">Focus Mode</a>
    </nav>
  </header>

  <main>
    <section class="schedule-section">
      <h2>📚 Jadwal Kuliah</h2>

      <div class="schedule-form" role="form" aria-label="Form Tambah Jadwal Kuliah">
  <input type="text" id="courseInput" placeholder="Nama Mata Kuliah" aria-label="Nama Mata Kuliah">

  <select id="dayInput" aria-label="Pilih Hari Kuliah">
    <option value="">Pilih Hari</option>
    <option value="Senin">Senin</option>
    <option value="Selasa">Selasa</option>
    <option value="Rabu">Rabu</option>
    <option value="Kamis">Kamis</option>
    <option value="Jumat">Jumat</option>
    <option value="Sabtu">Sabtu</option>
  </select>

  <input 
    type="text" 
    id="startTime" 
    placeholder="Jam Mulai Kuliah ⏰" 
    aria-label="Jam Mulai Kuliah"
    onfocus="(this.type='time')" 
    onblur="if(!this.value) this.type='text'"
    required
  >
         
  <input 
    type="text" 
    id="endTime" 
    placeholder="Jam Selesai (Opsional) 🔒" 
    aria-label="Jam Selesai Kuliah"
    onfocus="(this.type='time')" 
    onblur="if(!this.value) this.type='text'"
  >

  <input type="text" id="noteInput" placeholder="Catatan (Ruangan/Dosen)" aria-label="Catatan Tambahan">

  <button id="btnTambahJadwal">Tambah Jadwal</button>
</div>

      <div class="table-responsive-wrapper">
        <table class="schedule-table">
          <caption class="visually-hidden" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">Daftar Jadwal Kuliah Mingguan</caption>
          
          <thead>
            <tr>
              <th scope="col">Hari</th>
              <th scope="col">Mata Kuliah</th>
              <th scope="col">Jam</th>
              <th scope="col">Catatan</th>
              <th scope="col">Aksi</th>
            </tr>
          </thead>

          <tbody id="scheduleList">
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="/src/main.js"></script>

</body>
</html>
