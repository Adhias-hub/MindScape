<!DOCTYPE html>
<html lang="id">

<head>
  <meta name="description" content="MindSpace: Aplikasi produktivitas mahasiswa untuk mengatur jadwal kuliah, tugas, kesehatan, dan fokus belajar dengan notifikasi pintar.">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/src/jadwal.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Kuliah - MindSpace</title>
  <link rel="stylesheet" href="jadwal.css">
  <link rel="manifest" href="manifest.json">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://*.googleapis.com; style-src 'self' 'unsafe-inline'; img-src 'self' https://cdn-icons-png.flaticon.com https://apis.google.com data:; connect-src 'self' https://cdn-icons-png.flaticon.com https://*.googleapis.com https://*.firebaseio.com https://*.firebase.com https://identitytoolkit.googleapis.com https://firebaseinstallations.googleapis.com https://fcm.googleapis.com https://fcmregistrations.googleapis.com https://apis.google.com https://www.gstatic.com; frame-src https://*.firebaseapp.com https://accounts.google.com;">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header class="home-header">
    <div class="logo-area">
      <h1>MindSpace 🌸</h1>
    </div>

    <!-- NAVBAR (Accessibility Fix: Menambahkan label penjelas navigasi) -->
    <nav class="navbar" aria-label="Menu Navigasi Utama">
      <a href="home.html">Beranda</a>
      <a href="jadwal.html">Jadwal</a>
      <a href="todo.html">To-Do List</a>
      <a href="wellness.html">Wellness</a>
      <a href="focus.html">Focus Mode</a>
    </nav>
  </header>

  <!-- ================= MAIN CONTENT ================= -->
  <main>
    <section class="schedule-section">
      <h2>📚 Jadwal Kuliah</h2>

      <!-- FORM INPUT (Accessibility Fix: Menambahkan label tersembunyi/placeholder valid untuk Screen Reader) -->
      <div class="schedule-form" role="form" aria-label="Form Tambah Jadwal Kuliah">
        
        <input type="text" id="courseInput" placeholder="Nama Mata Kuliah" aria-label="Nama Mata Kuliah">

        <select id="dayInput" aria-label="Pilih Hari Kuliah">
          <option value="">Pilih Hari</option>
          <option value="Senin">Senin</option>
          <option value="Selasa">Selasa</option>
          <option value="Rabu">Rabu</option>
          <option value="Kamis">Kamis</option>
          <option value="Jumat">Jumat</option>
          <option value="Sabtu">Sabtu</option>
        </select>

        <input type="time" id="startTime" aria-label="Jam Mulai Kuliah">
        <input type="time" id="endTime" aria-label="Jam Selesai Kuliah">
        <input type="text" id="noteInput" placeholder="Catatan (Ruangan/Dosen)" aria-label="Catatan Tambahan">

        <button onclick="addSchedule()">Tambah Jadwal</button>
      </div>

      <!-- TABEL DATA -->
      <table class="schedule-table">
        <!-- Best Practices Fix: Menambahkan caption tabel untuk kejelasan struktur data -->
        <caption class="visually-hidden" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">Daftar Jadwal Kuliah Mingguan</caption>
        
        <thead>
          <tr>
            <th scope="col">Hari</th>
            <th scope="col">Mata Kuliah</th>
            <th scope="col">Jam</th>
            <th scope="col">Catatan</th>
            <th scope="col">Aksi</th>
          </tr>
        </thead>

        <tbody id="scheduleList">
          <!-- Data akan dirender secara dinamis oleh script.js -->
        </tbody>
      </table>
    </section>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
