<!DOCTYPE html>
<html lang="id">

<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://apis.google.com https://*.googleapis.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' https://cdn-icons-png.flaticon.com https://apis.google.com data:; connect-src 'self' https://cdn-icons-png.flaticon.com https://*.googleapis.com https://*.firebaseio.com https://*.firebase.com https://identitytoolkit.googleapis.com https://firebaseinstallations.googleapis.com https://fcm.googleapis.com https://fcmregistrations.googleapis.com https://apis.google.com; frame-src https://*.firebaseapp.com https://accounts.google.com;">
  <meta name="description" content="MindSpace: Aplikasi produktivitas mahasiswa untuk mengatur jadwal kuliah, tugas, kesehatan, dan fokus belajar dengan notifikasi pintar.">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wellness</title>
  
  <link rel="stylesheet" href="/src/wellness.css">
  <link rel="manifest" href="manifest.json">

  <style>
    .btn-toggle-history {
      width: 100%;
      padding: 16px;
      background: #f4f6ff;
      color: #4b5cff;
      border: 2px dashed #4b5cff;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
      text-align: center;
      box-shadow: 0 4px 12px rgba(75, 92, 255, 0.02);
      margin-bottom: 25px;
    }

    .btn-toggle-history:hover {
      background: #eef1ff;
      transform: translateY(-1px);
    }

    .btn-toggle-history.aktif {
      background: #4b5cff;
      color: white;
      border-style: solid;
      box-shadow: 0 8px 20px rgba(75, 92, 255, 0.15);
    }

    .box-histori-pembungkus {
      animation: slideDownFade 0.3s ease-out;
    }

    @keyframes slideDownFade {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <header class="home-header">
    <div class="logo-area">
      <h1>MindSpace 🌸</h1>
    </div>

    <nav class="navbar" aria-label="Menu Navigasi Utama">
      <a href="home.html">Beranda</a>
      <a href="jadwal.html">Jadwal</a>
      <a href="todo.html">To-Do List</a>
      <a href="wellness.html">Wellness</a>
      <a href="focus.html">Focus Mode</a>
    </nav>
  </header>

  <section class="wellness-section">
    <h2>💧 Wellness Reminder</h2>

    <div class="wellness-form" role="form" aria-label="Form Tambah Reminder Kesehatan">
  <select id="wellnessType" aria-label="Pilih Jenis Reminder">
    <option value="">Pilih Jenis Aktivitas 🪻</option>
    <option value="Minum Air">💧 Minum Air</option>
    <option value="Makan">🍽️ Makan Tepat Waktu</option>
    <option value="Peregangan Fisik">🧘 Peregangan & Istirahat Mata</option>
    <option value="Minum Vitamin">💊 Minum Vitamin / Obat</option>
  </select>
  
  <input 
    type="text" 
    id="wellnessTime" 
    placeholder="Set Jam Operasional ⏰" 
    aria-label="Pilih Jam Reminder"
    onfocus="(this.type='time')" 
    onblur="if(!this.value) this.type='text'"
    required
  >
         
  <input type="text" id="wellnessNote" placeholder="Tulis pesan motivasi (opsional)" aria-label="Pesan Motivasi">
  
  <button id="btnTambahWellness">Tambah Reminder</button>
</div>

    <div class="water-target">
      💙 Target minum hari ini: 8 gelas air
    </div>

    <div id="containerListWellness"></div>

    <div class="wellness-history-section" style="margin-top: 50px; max-width: 1200px; margin-left: auto; margin-right: auto;">
      
      <button class="btn-toggle-history" id="btnToggleWellness">
        📜 Log Kesehatan Hari Ini (Buka)
      </button>

      <div id="pembungkusHistoriWellness" class="box-histori-pembungkus" style="display: none;">
        <h3 style="color: #7c3aed; margin-bottom: 20px; font-size: 22px; font-weight: 800;">📜 Log Kesehatan Hari Ini</h3>
        <div id="wellnessHistoryList"></div>
      </div>

    </div>

  </section>

  <script type="module" src="/src/main.js"></script>

</body>
</html>
